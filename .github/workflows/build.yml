# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build

on:
  pull_request:
    branches:
      - "*"

defaults:
  run:
    shell: bash

jobs:
  Build:
    strategy:
      matrix:
        node_version: [20, 24]
        os: ["macos-latest", "windows-latest"]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6

      - name: "📦 Setup pnpm"
        uses: pnpm/action-setup@v4

      - name: "🗃️ Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          cache: "pnpm"

      - name: "📐 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🏗️ Build"
        run: pnpm run build

      - name: "🖌️ Lint"
        run: pnpm run lint

      - name: "🧪 Test"
        run: pnpm run test
