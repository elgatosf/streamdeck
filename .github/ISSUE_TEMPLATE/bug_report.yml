name: Bug report
description: Report a bug or issue.
labels: ["triage"]
type: "Bug"

body:
  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Call the first function
        2. Call the second function
        3. See error
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected vs Actual Behavior
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true

  - type: input
    attributes:
      label: SDK Version
      description: Which version of the Stream Deck SDK are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true

  - type: input
    attributes:
      label: Node.js Version
      description: Which version of Node.js are you using?
      placeholder: e.g., 20.5.1
    validations:
      required: true

  - type: input
    attributes:
      label: Stream Deck Version
      description: Which version of Stream Deck are you using?
      placeholder: e.g., 7.2.0
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: OS
      description: Which operating system(s) did you observe this behavior on?
      options:
        - label: macOS
        - label: Windows
    validations:
      required: true
